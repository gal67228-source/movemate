name: Flutter CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    name: Analyze, test and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create Android platform files
        run: >-
          flutter create .
          --platforms=android
          --org com.movemate
          --project-name movemate

      - name: Install dependencies
        run: flutter pub get

      # Format inside CI and continue. This prevents style-only differences
      # from blocking APK compilation when a ZIP was created on another system.
      - name: Format Dart source
        run: dart format lib test

      - name: Analyze source code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter=expanded

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: movemate-android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
