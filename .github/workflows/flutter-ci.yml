name: Flutter CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    name: Analyze, test and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create Android platform files
        run: >-
          flutter create .
          --platforms=android
          --org com.movemate
          --project-name movemate
          --no-pub

      - name: Configure Firebase Android when secret is available
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
            python3 scripts/enable_google_services.py
            echo "Firebase Android configuration enabled."
          else
            echo "Firebase secret not configured; building with local-mode fallback."
          fi

      - name: Configure permanent Android signing when secrets are available
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/movemate-release.jks
            cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=movemate-release.jks
          EOF
            python3 scripts/configure_android_signing.py
            echo "Permanent Android release signing enabled."
          else
            echo "Signing secrets not configured; using Flutter's development signing fallback."
          fi

      - name: Install dependencies
        run: flutter pub get

      # Format inside CI and continue. This prevents style-only differences
      # from blocking APK compilation when a ZIP was created on another system.
      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format Dart source
        run: dart format lib test

      - name: Analyze source code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter=expanded

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: movemate-android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
